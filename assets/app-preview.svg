<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">SolvaIIRAG application preview</title>
  <desc id="desc">Dark Streamlit-style interface for a Solvency II regulatory RAG assistant with embedded corpus, suggested questions, answer panel, and citations.</desc>
  <rect width="1280" height="720" fill="#0d1117"/>
  <rect x="0" y="0" width="310" height="720" fill="#161b22"/>
  <rect x="309" y="0" width="1" height="720" fill="#30363d"/>
  <text x="38" y="58" font-family="Arial, sans-serif" font-size="28" fill="#e6edf3">Solvabilite II</text>
  <text x="38" y="86" font-family="Arial, sans-serif" font-size="14" fill="#8b949e">RAG · public regulatory assistant</text>
  <text x="38" y="145" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#8b949e">EMBEDDED CORPUS</text>
  <rect x="38" y="162" width="220" height="40" rx="7" fill="#1c232d" stroke="#30363d"/>
  <text x="54" y="187" font-family="Arial, sans-serif" font-size="14" fill="#c9a84c">Directive/ · 23 files detected</text>
  <text x="38" y="252" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#8b949e">RETRIEVAL</text>
  <rect x="38" y="270" width="96" height="36" rx="7" fill="#c9a84c"/>
  <text x="67" y="293" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#000">BM25</text>
  <rect x="144" y="270" width="104" height="36" rx="7" fill="#1c232d" stroke="#30363d"/>
  <text x="173" y="293" font-family="Arial, sans-serif" font-size="14" fill="#e6edf3">Hybrid</text>
  <rect x="38" y="362" width="136" height="34" rx="17" fill="#11291b" stroke="#3fb950"/>
  <circle cx="58" cy="379" r="5" fill="#3fb950"/>
  <text x="74" y="384" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#3fb950">Engine ready</text>

  <text x="360" y="68" font-family="Georgia, serif" font-size="38" fill="#e6edf3">Solvency II RAG</text>
  <rect x="622" y="42" width="58" height="24" rx="12" fill="#c9a84c"/>
  <text x="637" y="59" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#000">RAG</text>
  <text x="360" y="98" font-family="Arial, sans-serif" font-size="16" fill="#8b949e">Ask regulatory questions with source citations. Groq LLM generation is optional.</text>
  <line x1="360" y1="124" x2="1190" y2="124" stroke="#30363d"/>

  <text x="360" y="170" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#e6edf3">Quick questions</text>
  <g font-family="Arial, sans-serif" font-size="14" fill="#000" font-weight="700">
    <rect x="360" y="190" width="162" height="42" rx="7" fill="#c9a84c"/><text x="382" y="216">Best Estimate</text>
    <rect x="536" y="190" width="160" height="42" rx="7" fill="#c9a84c"/><text x="557" y="216">Risk Margin</text>
    <rect x="710" y="190" width="150" height="42" rx="7" fill="#c9a84c"/><text x="739" y="216">Art. 45 ORSA</text>
    <rect x="874" y="190" width="168" height="42" rx="7" fill="#c9a84c"/><text x="898" y="216">Governance</text>
  </g>

  <rect x="360" y="280" width="830" height="86" rx="12" fill="#161b22" stroke="#30363d"/>
  <text x="384" y="316" font-family="Arial, sans-serif" font-size="17" fill="#e6edf3">What does Article 101 say about the SCR?</text>
  <text x="384" y="344" font-family="Arial, sans-serif" font-size="13" fill="#8b949e">Retrieval runs immediately against the embedded Directive corpus.</text>

  <rect x="360" y="402" width="830" height="196" rx="12" fill="#161b22" stroke="#30363d"/>
  <text x="384" y="438" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#8b949e">ASSISTANT</text>
  <text x="384" y="474" font-family="Arial, sans-serif" font-size="18" fill="#e6edf3">The SCR is the risk-based capital requirement calibrated to protect</text>
  <text x="384" y="502" font-family="Arial, sans-serif" font-size="18" fill="#e6edf3">policyholders over a one-year horizon at a 99.5% confidence level.</text>
  <rect x="384" y="532" width="244" height="34" rx="17" fill="#2a2415" stroke="#c9a84c"/>
  <text x="402" y="554" font-family="Arial, sans-serif" font-size="13" fill="#c9a84c">CELEX_32009L0138 · p. 51</text>
  <rect x="644" y="532" width="194" height="34" rx="17" fill="#2a2415" stroke="#c9a84c"/>
  <text x="662" y="554" font-family="Arial, sans-serif" font-size="13" fill="#c9a84c">Article 101 cited</text>
</svg>
